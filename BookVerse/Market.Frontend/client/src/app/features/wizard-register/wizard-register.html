<form class="wizard-form" [formGroup]="registerForm">
    <mat-horizontal-stepper style="text-align: center;" linear #formStepper>
        <mat-step class="step">
            <div class="steps-container">
                <div class="step">
                    <h3>Lični podaci</h3>
                    <mat-form-field class="form-control">
                        <label for="firstName">Ime</label>
                        <input formControlName="firstName" type="text" id="firstName" name="firstName" matInput
                            required />
                        <mat-error>Ime mora imati najmanje 2 karaktera.</mat-error>
                    </mat-form-field>
                    <mat-form-field class="form-control">
                        <label for="lastName">Prezime</label>
                        <input formControlName="lastName" type="text" id="lastName" name="lastName" matInput required />
                        <mat-error>Prezime mora imati najmanje 2 karaktera.</mat-error>
                    </mat-form-field>
                </div>
            </div>

            <button type="button" class="next-btn button-s" [disabled]="!isFirstStepValid" matStepperNext>Sljedeći
                korak</button>
        </mat-step>

        <mat-step>
            <div class="steps-container">
                <div class="step">
                    <h3>Account Information</h3>
                    <mat-form-field class="form-control">
                        <label for="email">Email</label>
                        <input formControlName="email" type="text" id="email" name="email" matInput required />
                        <mat-error>Unesite važeću email adresu.</mat-error>
                    </mat-form-field>
                    <mat-form-field class="form-control">
                        <label for="lastName">Lozinka</label>
                        <input formControlName="password" type="password" id="password" name="password" matInput
                            required />
                        <mat-error>Lozinka mora imati najmanje 6 karaktera.</mat-error>
                    </mat-form-field>
                    <mat-form-field class="form-control">
                        <label for="lastName">Ponovo unesite lozinku</label>
                        <input formControlName="confirmedPassword" type="password" id="confirmedPassword"
                            name="confirmedPassword" matInput required />
                        <mat-error>Lozinke se ne podudaraju</mat-error>
                    </mat-form-field>
                </div>
            </div>

            <div class="prev-next">
                <button type="button" class="next-btn" matStepperPrevious>Back</button>
                <button type="button" class="next-btn" matStepperNext [disabled]="!isSecondStepValid">Next</button>
            </div>
        </mat-step>

        <mat-step>
            <div class="steps-container">
                <div class="step">
                    <h3>Address</h3>
                    <mat-form-field class="form-control">
                        <label for="line1">Ulica i broj</label>
                        <input formControlName="line1" type="text" id="line1" name="line1" matInput required />
                        <mat-error>Ulica i broj su obavezni.</mat-error>
                    </mat-form-field>
                    <mat-form-field class="form-control">
                        <label for="line2">Dodatne informacije (npr. sprat, stan)</label>
                        <input formControlName="line2" type="text" id="line2" name="line2" matInput />
                    </mat-form-field>
                    <mat-form-field class="form-control">
                        <label for="city">Grad</label>
                        <input formControlName="city" type="text" id="city" name="city" matInput required />
                        <mat-error>Grad je obavezan.</mat-error>
                    </mat-form-field>
                    <mat-form-field class="form-control">
                        <label for="country">Država</label>
                        <input formControlName="country" type="text" id="country" name="country" matInput required />
                        <mat-error>Država je obavezna.</mat-error>
                    </mat-form-field>
                </div>
            </div>
            <div class="prev-next">
                <button type="button" class="next-btn" matStepperPrevious>Back</button>
                <button type="button" class="next-btn" (click)="onRegister()"
                    [disabled]="!isThirdStepValid">Submit</button>
            </div>
        </mat-step>
    </mat-horizontal-stepper>
</form>

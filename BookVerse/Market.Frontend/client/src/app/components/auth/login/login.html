<div class="parent">
    <div class="signup-container">
        @if(showLoginError){
        <div class="login-error-banner">
            <mat-icon class="error-icon">error_outline</mat-icon>
            <span class="error_message">Neispravna e-mail adresa ili lozinka. Molimo pokušajte ponovo.</span>
        </div>
        }
        <form id="signup-form" class="signup-form" [formGroup]="registerForm">
            <h2>Prijava</h2>
            <mat-form-field class="form-control">
                <label>Email</label>
                <input type="text" formControlName="email" id="email" name="email" matInput required />
                <mat-error>Unesite važeću email adresu.</mat-error>
            </mat-form-field>

            <mat-form-field class="form-control">
                <label>Lozinka</label>
                <input type="password" formControlName="password" id="password" name="password" matInput required />
                <mat-error>Lozinka mora imati najmanje 6 karaktera.</mat-error>
            </mat-form-field>
            <button type="button" class="login-button" (click)="onLogin()" [disabled]="!validMailPass">Prijavi
                se</button>

            <div class="login-link">
                <p class="sign-up">Novi ste ovdje?<a routerLink="/register">Registrujte se</a></p>
            </div>
        </form>
    </div>
</div>

<div class="dynamic-form-container">
  <h2>Kreiraj kupon</h2>

  <!-- Admin bira tip kupona — ovisno o odabiru, backend vraća različita polja -->
  <div class="type-selector">
    <button mat-raised-button 
            [color]="selectedType === 'percent' ? 'primary' : ''"
            (click)="onTypeChange('percent')">
      Procentualni popust
    </button>
    <button mat-raised-button 
            [color]="selectedType === 'amount' ? 'primary' : ''"
            (click)="onTypeChange('amount')">
      Fiksni iznos
    </button>
    <br>
    <br>
  </div>

  <!-- Forma se prikazuje tek kada su polja dobijena sa servera -->
  <form *ngIf="formFields.length > 0" [formGroup]="dynamicForm" (ngSubmit)="onSubmit()">
    
    <!-- Za svako polje koje server vrati, dinamički renderujemo input -->
    <div *ngFor="let field of formFields" class="form-field">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ field.label }}</mat-label>
        <input matInput 
               [type]="field.type"
               [formControlName]="field.name" />
        <mat-error *ngIf="dynamicForm.get(field.name)?.invalid">
          {{ field.label }} je obavezno polje
        </mat-error>
      </mat-form-field>
      <br>
    </div>

    <button mat-raised-button color="primary" type="submit" [disabled]="dynamicForm.invalid">
      Sačuvaj kupon
    </button>
  </form>

  <!-- Prikaz unesenih vrijednosti nakon submita -->
  <div *ngIf="submitted && formValues" class="result">
    <h3>Uneseni podaci:</h3>
    <div *ngFor="let field of formFields">
      <strong>{{ field.label }}:</strong> {{ formValues[field.name] }}
    </div>
  </div>
</div>

<div class="dynamic-form-container">
  <h2>Kreiraj kupon</h2>

  <div class="type-selector">
    <button
      mat-raised-button
      [color]="selectedType === 'percent' ? 'primary' : ''"
      (click)="onTypeChange('percent')"
    >
      Procentualni popust
    </button>
    <button
      mat-raised-button
      [color]="selectedType === 'amount' ? 'primary' : ''"
      (click)="onTypeChange('amount')"
    >
      Fiksni iznos
    </button>
  </div>

  <form *ngIf="formFields.length > 0" [formGroup]="dynamicForm" (ngSubmit)="onSubmit()">
    <div *ngFor="let field of formFields" class="form-field">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ field.label }}</mat-label>

        <!-- Dinamički datepicker: svako polje dobija svoju referencu -->
        <ng-container *ngIf="field.type === 'date'; else otherInput">
          <input matInput [formControlName]="field.name" [matDatepicker]="picker" />
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </ng-container>

        <!-- Za sve ostale tipove -->
        <ng-template #otherInput>
          <input matInput [type]="field.type" [formControlName]="field.name" />
        </ng-template>

        <mat-error *ngIf="dynamicForm.get(field.name)?.invalid">
          {{ field.label }} je obavezno polje
        </mat-error>
      </mat-form-field>
    </div>

    <button mat-raised-button color="primary" type="submit" [disabled]="dynamicForm.invalid">
      Sačuvaj kupon
    </button>
  </form>

  <div *ngIf="submitted && formValues" class="result">
    <h3>Uneseni podaci:</h3>
    <div *ngFor="let field of formFields">
      <strong>{{ field.label }}:</strong> {{ formValues[field.name] }}
    </div>
  </div>
</div>

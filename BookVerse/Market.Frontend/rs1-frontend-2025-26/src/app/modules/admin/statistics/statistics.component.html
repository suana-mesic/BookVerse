<div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; padding: 20px">
  <!-- Prvi grafikon -->
  <div
    style="
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    "
  >
    <canvas
      id="revenueChart"
      style="width: 100%; height: auto; aspect-ratio: 16/9; display: block"

<app-header></app-header>

<div class="page-wrapper">
  <a class="back-nav" (click)="goBack()" style="cursor: pointer">
    <mat-icon>arrow_back</mat-icon>
    <span>Nazad</span>
  </a>

  <div class="payment-container">
    <div class="order-summary">
      <strong>Ukupno za plaćanje</strong>
      <strong>{{ totalPrice | number: '1.2-2' : 'en' }} KM</strong>
    </div>

    <div id="payment-element"></div>

    <div class="captcha-section">
      <p class="captcha-label">Sigurnosna provjera</p>

      <div class="captcha-image-row">
        <img [src]="captchaImage" alt="Captcha" />
        <button mat-stroked-button (click)="loadCaptcha()">
          <mat-icon>cached</mat-icon>
          Nova slika
        </button>
      </div>

      <mat-form-field appearance="outline">
        <mat-label>Unesite tekst sa slike</mat-label>
        <input matInput [(ngModel)]="captchaAnswer" />
      </mat-form-field>

      <button
        class="verify-btn"
        mat-raised-button
        (click)="verifyCaptcha()"
        [disabled]="captchaVerified"
      >
        <mat-icon *ngIf="captchaVerified">check_circle</mat-icon>
        {{ captchaVerified ? 'Verificirano' : 'Potvrdi' }}
      </button>
    </div>

    <div class="payment-actions">
      <button
        mat-raised-button
        color="primary"
        (click)="submitPayment()"
        [disabled]="isLoading || !captchaVerified"
      >
        {{ isLoading ? 'Obrada...' : 'Plati ' + (totalPrice | number: '1.2-2' : 'en') + ' KM' }}
      </button>
    </div>
  </div>
</div>

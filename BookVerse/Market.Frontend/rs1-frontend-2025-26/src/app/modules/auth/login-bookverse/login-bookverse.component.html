<div class="parent">
    <div class="signup-container">
        <form id="signup-form" class="signup-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            @if(showLoginError){
            <div class="login-error-banner">
                <mat-icon class="error-icon">error_outline</mat-icon>
                <span class="error_message">Neispravna e-mail adresa ili lozinka. Molimo pokušajte ponovo.</span>
            </div>
            }
            <h1>Prijava</h1>
            <mat-form-field class="form-control">
                <mat-label>Email</mat-label>
                <input type="text" formControlName="email" id="email" name="email" placeholder="Email" matInput
                    required />
                <mat-error>Unesite važeću email adresu.</mat-error>
            </mat-form-field>

            <mat-form-field class="form-control">
                <mat-label>Password</mat-label>
                <input type="password" formControlName="password" id="password" name="password" placeholder="Lozinka"
                    matInput required />
                <mat-error>Lozinka mora imati najmanje 6 karaktera.</mat-error>
            </mat-form-field>
            <button type="submit" class="login-button" [disabled]="loginForm.invalid || isLoading">
                Prijavi se
            </button>

            <div class="login-link">
                <p class="sign-up">Novi ste ovdje? <a routerLink="/auth/register">Registrujte se</a></p>
            </div>
        </form>
    </div>
</div>

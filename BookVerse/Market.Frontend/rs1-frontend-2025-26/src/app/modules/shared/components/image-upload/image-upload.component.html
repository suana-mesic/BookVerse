<div class="upload"
  [class.dragging]="isDragging"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)">

  <input #fileInput type="file" accept="image/*" (change)="onFileSelect($event)" hidden>

  @if(!preview) {
    <div class="drop-zone" (click)="fileInput.click()">
      <mat-icon class="upload-icon">cloud_upload</mat-icon>
      <p class="drop-text">Prevuci sliku ovdje</p>
      <span class="or">ili</span>
      <button type="button" class="browse-btn">Pretraži sliku</button>
    </div>
  }

  @if(preview) {
    <div class="preview">
      <img [src]="preview" alt="Preview">
      <button type="button" class="remove" (click)="remove()">✕</button>
    </div>
  }
</div>

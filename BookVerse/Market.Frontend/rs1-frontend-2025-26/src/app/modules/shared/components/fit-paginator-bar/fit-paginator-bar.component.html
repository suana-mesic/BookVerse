<div class="paginator-bar" *ngIf="vm.totalItems > 0">
  <div class="paginator-container">
    <div class="page-size-selector">
      <span class="selector-label">Po stranici:</span>
      <mat-form-field appearance="fill" class="page-size-field">
        <mat-select
          [value]="vm.request.paging.pageSize"
          (selectionChange)="vm.changePageSize($event.value)"
          [disabled]="vm.isLoading"
          [compareWith]="comparePageSize"
        >
          <mat-option [value]="5">5</mat-option>
          <mat-option [value]="10">10</mat-option>
          <mat-option [value]="20">20</mat-option>
          <mat-option [value]="50">50</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="nav-buttons">
      <button
        class="nav-arrow"
        (click)="vm.prevPage()"
        [disabled]="vm.request.paging.page <= 1 || vm.isLoading"
      >
        <mat-icon>chevron_left</mat-icon>
        <span>Prethodna</span>
      </button>

      <ng-container *ngFor="let p of getPageNumbers()">
        <span *ngIf="p === -1" class="page-ellipsis">…</span>
        <button
          *ngIf="p !== -1"
          class="page-btn"
          [class.active]="p === vm.request.paging.page"
          (click)="vm.goToPage(p)"
          [disabled]="vm.isLoading"
        >
          {{ p }}
        </button>
      </ng-container>

      <button
        class="nav-arrow"
        (click)="vm.nextPage()"
        [disabled]="(vm.totalPages && vm.request.paging.page >= vm.totalPages) || vm.isLoading"
      >
        <span>Naredna</span>
        <mat-icon>chevron_right</mat-icon>
      </button>
    </div>

    <div class="paginator-info">
      <span class="info-text">
        {{ vm.totalItems }} zapisa &nbsp;·&nbsp; stranica
        <strong>{{ vm.request.paging.page }}</strong> od <strong>{{ vm.totalPages || 1 }}</strong>
      </span>
    </div>
  </div>
</div>

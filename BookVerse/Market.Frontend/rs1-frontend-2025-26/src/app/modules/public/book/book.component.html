<div class="book">
  <div class="book__cover"></div>
  <h3>{{ book().title }}</h3>
  <div class="book__rating-and-count">
    <div class="book__rating">
      <h4>{{ 4.2 }}</h4>
      <img src="./icons/star.png" alt="icon" />
    </div>
    <div class="book__user-count">
      <h4>{{ 15 }}</h4>
      <img src="./icons/default_profile.png" alt="icon" />
    </div>
  </div>
  <div class="book__authors">
    @for(author of book().authors; let i = $index; track author.id){
    <label>{{ `${author.firstName} ${author.lastName}` }}</label>
    @if(i < book().authors.length - 1) {
    <label>,&nbsp;</label>
    } }
  </div>
  <h3>{{ book().price }} KM</h3>
</div>

<div #searchAndFilters class="test">
  <div class="search-and-filters">
    <div class="search-and-filter-button">
      <div class="search-and-filters__search">
        <input type="text" [placeholder]="'CLIENT.SEARCH.PLACEHOLDER' | translate" />
        <img src="icons/finder.png" alt="icon" />
      </div>
      <button (click)="showFilters()" class="search-and-filters__filter-button">
        <h2 #filterButtonText>{{ 'CLIENT.SEARCH.FILTERS' | translate }}</h2>
        <img src="icons/filter_white.png" alt="icon" />
      </button>
    </div>
    <div class="category-and-price-range">
      <div class="category-and-price-range__book">
        <div (click)="showCategories()" class="category-and-price-range__book-category">
          <h2 class="category-and-price-range__book__select">
            {{ 'CLIENT.SEARCH.CATEGORIES' | translate }}
          </h2>
          <img src="icons/drop_menu_arrow.png" alt="icon" />
        </div>

        <div #categoryDropMenu class="category-and-price-range__book-category-drop-menu">
          <div class="category-and-price-range__book__search">
            <input type="text" [placeholder]="'CLIENT.SEARCH.SEARCH_CATEGORIES' | translate" />
          </div>
          @for (category of categories(); let i = $index; track category.id) {
            <div class="search-and-filters__select">
              <div class="search-and-filters__select__checkbox"></div>
              <h2>{{ category.name }}</h2>
            </div>
          }
        </div>
      </div>

      <div class="category-and-price-range__price-range">
        <input type="number" [placeholder]="'CLIENT.SEARCH.PRICE_MIN_PLACEHOLDER' | translate" />
      </div>
      <h1>-</h1>
      <div class="category-and-price-range__price-range">
        <input type="number" [placeholder]="'CLIENT.SEARCH.PRICE_MAX_PLACEHOLDER' | translate" />
      </div>
    </div>

    <div class="author-and-submit-button">
      <div (click)="showAuthors()" class="author-and-submit-button__author">
        <h2 class="author-and-submit-button__select">
          {{ 'CLIENT.SEARCH.SELECT_AUTHORS' | translate }}
        </h2>
        <img src="icons/drop_menu_arrow.png" alt="icon" />
      </div>

      <div #authorDropMenu class="author-and-submit-button__drop-menu">
        <div class="author-and-submit-button__search">
          <input type="text" [placeholder]="'CLIENT.SEARCH.SEARCH_AUTHORS' | translate" />
        </div>
      </div>

      <button class="author-and-submit-button__submit-button">
        {{ 'CLIENT.SEARCH.APPLY' | translate }}
      </button>
    </div>
  </div>
</div>

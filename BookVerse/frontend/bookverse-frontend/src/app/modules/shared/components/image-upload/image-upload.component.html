<div
  class="upload"
  [class.dragging]="isDragging"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
>
  <input #fileInput type="file" accept="image/*" (change)="onFileSelect($event)" hidden />

  @if (!preview) {
    <div class="drop-zone" (click)="fileInput.click()">
      <mat-icon class="upload-icon">cloud_upload</mat-icon>
      <p class="drop-text">{{ 'IMAGE_UPLOAD.DRAG_HERE' | translate }}</p>
      <span class="or">{{ 'COMMON.OR' | translate }}</span>
      <button type="button" class="browse-btn">{{ 'IMAGE_UPLOAD.BROWSE' | translate }}</button>
    </div>
  }

  @if (preview) {
    <div class="preview">
      <img [src]="preview | apiUrl" [alt]="'IMAGE_UPLOAD.PREVIEW_ALT' | translate" />
      <button type="button" class="remove" (click)="remove()">✕</button>
    </div>
  }
</div>
